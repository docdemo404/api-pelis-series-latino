name: Automated Link Health Checker & Scraper

on:
  schedule:
    # Se ejecuta automáticamente cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permite ejecución manual desde la interfaz de GitHub

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar Verificación de Salud de Enlaces y Scraping
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: npx ts-node src/services/checkerService.ts
