name: Catalog Refresh & Pre-scrape a Supabase

on:
  schedule:
    # Crawl COMPLETO del catálogo una vez al día (04:00 UTC). Es más pesado que el antiguo
    # refresh de home/últimos, así que se corre a diario en lugar de cada 6 h para no saturar
    # las fuentes; los listados (getAll) ya se auto-refrescan en vivo entre corridas.
    - cron: '0 4 * * *'
  workflow_dispatch: # Permite ejecución manual desde la interfaz de GitHub

jobs:
  refresh-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      # Crawl COMPLETO del catálogo (todas las categorías de tioplus paginadas hasta agotar +
      # todo FuegoCine) y lo persiste en Supabase. La API sirve búsqueda/listados desde la DB
      # (DB-first) en milisegundos, con recuperación total y scroll infinito.
      #
      # --streams=300 pre-resuelve además los enlaces de los títulos que alimentan el home,
      # para que su ficha emergente abra con los servidores ya listos (requiere la
      # migración 004; sin ella el paso se omite con un aviso).
      - name: Refrescar catálogo pre-scrapeado en Supabase
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # Necesaria para escribir en media_items (la tabla tiene RLS activado)
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx ts-node scripts/refreshCatalog.ts --streams=300
