name: Catalog Refresh & Pre-scrape a Supabase

on:
  schedule:
    # Se ejecuta automáticamente cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permite ejecución manual desde la interfaz de GitHub

jobs:
  refresh-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      # Pre-scrapea el catálogo (homepage + últimos películas/series/animes) y lo
      # persiste en Supabase. La API sirve búsqueda/listados desde la DB (DB-first)
      # en milisegundos en lugar de scrapear dentro del request.
      - name: Refrescar catálogo pre-scrapeado en Supabase
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # Necesaria para escribir en media_items (la tabla tiene RLS activado)
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx ts-node scripts/refreshCatalog.ts
